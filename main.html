<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="boardContainer">
        <div id="chessboardContainer">
            <div id="chessboard"></div>
        </div>
        <div id="moveList">
            <div id="moveWarning" role="alert" aria-live="polite"></div>
            <div id="branchIndicator"></div>
            <div id="variationButtons"></div>
            <div id="pgnDisplay"></div>
            <div id="importControls">
                <button id="importPgnBtn">Import PGN</button>
                <button id="importFenBtn">Import FEN</button>
            </div>
            <div id="pgnControls">
                <button id="prevMove">Previous</button>
                <button id="nextMove">Next</button>
            </div>
            <div id="exportControls">
                <button id="exportPgn">Export PGN</button>
                <button id="exportFen">Export FEN</button>
                <button id="analysisBtn">Analysis</button>
            </div>
            <div id="editControls">
                <label id="unlockControl" for="unlockAddMoves">
                    <input type="checkbox" id="unlockAddMoves" name="unlockAddMoves">
                    Unlock Add Moves
                </label>
                <label id="flipControl" for="flipToggle">
                    <input type="checkbox" id="flipToggle" name="flipToggle">
                    Flip Board
                </label>
            </div>
        </div>        
    </div>
    <div id="keyboardHelp">
        <strong>Keyboard:</strong> 
        <span>Left/Right = prev/next</span> | 
        <span>Up/Down = switch variation</span> | 
        <span>Home = start</span>
    </div>
    <div id="promotionOverlay" aria-hidden="true">
        <div id="promotionDialog" role="dialog" aria-modal="true">
            <div id="promotionChoices"></div>
        </div>
    </div>
    <div id="pgnImportOverlay" aria-hidden="true">
        <div class="importDialog" role="dialog" aria-modal="true">
            <textarea id="pgnImportText">1. e4 c6 2. d4 d5 3. e5 Bf5 4. Bd3 (4. Nf3 e6 5. Nc3 h6 6. Bd3 Bxd3 7. cxd3 Nd7 8. Bf4 c5 9. Qa4 c4 10. dxc4 dxc4 11. O-O f6) 4... e6 5. Bxf5 exf5 6. Nf3 c5 7. c3 cxd4 8. cxd4 Nc6 9. O-O Be7 10. Nc3 Nh6 11. h3 f6 12. Be3 fxe5 13. dxe5 Nf7 14. Nxd5 Nfxe5 15. Nxe5 Nxe5 16. Qa4+ Nd7 17. Rfe1 O-O 18. Nxe7+ Qxe7 19. Qc4+ Kh8 20. Bc5 Nxc5 21. Rxe7 Ne4 22. Rxb7 Nd2 23. Qf4 Ne4 24. f3 Nc5 25. Rb5 Nd3</textarea>
            <div class="importActions">
                <button id="loadPgnFromOverlay">Load PGN</button>
                <button id="closePgnOverlay">Close</button>
            </div>
        </div>
    </div>
    <div id="fenImportOverlay" aria-hidden="true">
        <div class="importDialog" role="dialog" aria-modal="true">
            <input type="text" id="fenImportInput" placeholder="Enter FEN" />
            <div class="importActions">
                <button id="loadFenFromOverlay">Load FEN</button>
                <button id="closeFenOverlay">Close</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.min.js"></script>
    <script src="logic.js"></script>
    <script src="script.js"></script>
</body>
</html>
